name: Nightly (Experimental) Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Clean old d3d9.dll
        run: |
          echo "Removing old d3d9.dll if it exists..."
          del /Q "build\\bin\\Release\\d3d9.dll" || echo "No old DLL found."

      - name: Build solution (override output)
        run: msbuild build\\Client.sln /p:Configuration=Release /p:OutDir=build\\bin\\Release\\

      - name: Get short commit hash
        id: shortsha
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create/Update Nightly Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: Nightly Build
          body: Nightly build from commit ${{ steps.shortsha.outputs.short_sha }}
          draft: false
          prerelease: true

      - name: Upload d3d9.dll to nightly release (replace if exists)
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: d3d9.dll
          files: "build\\bin\\Release\\d3d9.dll"
          replace: true