name: Nightly (Experimental) Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Run generate.bat to create solution
        run: |
          echo "Running generate.bat to produce Client.sln..."
          call generate.bat
        shell: cmd
        working-directory: ${{ github.workspace }}

      - name: Verify Client.sln exists
        run: dir build
        shell: pwsh

      - name: Clean old d3d9.dll
        run: |
          Write-Host "Removing old d3d9.dll if it exists..."
          $dllPath = "bin/Release/d3d9.dll"
          if (Test-Path $dllPath) {
            Remove-Item $dllPath -Force
          } else {
            Write-Host "No old DLL found."
          }
        shell: pwsh
        working-directory: build

      - name: Build solution (override output)
        run: msbuild Client.sln /p:Configuration=Release /p:OutDir=bin/Release/
        shell: pwsh
        working-directory: build

      - name: Get short commit hash
        id: shortsha
        run: |
          $short = $env:GITHUB_SHA.Substring(0,7)
          Write-Output "short_sha=$short" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8
        shell: pwsh

      - name: Set nightly tag
        id: nightly_tag
        run: |
          $date = Get-Date -Format "yyyyMMdd"
          $tag = "nightly-$date"
          Write-Output "tag_name=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8
        shell: pwsh

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.nightly_tag.outputs.tag_name }}
          name: Nightly Build ${{ steps.nightly_tag.outputs.tag_name }}
          body: Nightly build from commit ${{ steps.shortsha.outputs.short_sha }}
          draft: false
          prerelease: true

      - name: Upload d3d9.dll
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.nightly_tag.outputs.tag_name }}
          name: d3d9.dll
          files: "bin/Release/d3d9.dll"
          replace: true

      - name: Cleanup old nightly releases (keep last 5)
        run: |
          $releases = gh release list --limit 100 | Where-Object { ($_ -split '\s+')[0] -like 'nightly-*' } | Sort-Object
          $count = $releases.Count
          if ($count -gt 5) {
            $toDelete = $releases | Select-Object -First ($count - 5)
            foreach ($r in $toDelete) {
              $tag = ($r -split '\s+')[0]
              gh release delete $tag -y
            }
          }
        shell: pwsh