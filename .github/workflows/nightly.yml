name: Nightly (Experimental) Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Run generate.bat to create solution
        run: |
          echo "Running generate.bat to produce Client.sln..."
          call generate.bat
        shell: cmd
        working-directory: ${{ github.workspace }}

      - name: Clean old d3d9.dll
        run: |
          Write-Host "Removing old d3d9.dll if it exists..."
          $dllPath = "build/bin/Release/d3d9.dll"
          if (Test-Path $dllPath) {
            Remove-Item $dllPath -Force
          } else {
            Write-Host "No old DLL found."
          }
        shell: pwsh

      - name: Build solution (override output)
        run: msbuild Client.sln /p:Configuration=Release /p:OutDir=bin/Release/
        shell: pwsh
        working-directory: build

      - name: Get short commit hash
        id: shortsha
        run: |
          $short = $env:GITHUB_SHA.Substring(0,7)
          Write-Output "short_sha=$short" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8
        shell: pwsh

      - name: Create/Update Nightly Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: Nightly Build
          body: Nightly build from commit ${{ steps.shortsha.outputs.short_sha }}
          draft: false
          prerelease: true
          overwrite: true   # automatically replaces the nightly release

      - name: Upload d3d9.dll to nightly release (replace if exists)
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: d3d9.dll
          files: "build/bin/Release/d3d9.dll"
          replace: true

      - name: Cleanup old artifacts (keep last 5)
        run: |
          gh release list --limit 100 | Select-Object -Skip 5 | ForEach-Object {
            $tag = ($_ -split '\s+')[0]
            if ($tag -ne "nightly") { gh release delete $tag -y }
          }
        shell: pwsh